# ── DDoS / Rate Limiting Zones (outside server block) ──────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── DDoS Protection ────────────────────────────────────────────────────
    limit_conn addr 20;                    # Max 20 concurrent connections per IP
    limit_req zone=general burst=50 nodelay; # 30 req/s with burst of 50
    client_body_timeout 10s;               # Slow-loris protection
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;
    client_max_body_size 2m;               # Block oversized payloads (ransomware/malware uploads)
    client_body_buffer_size 16k;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; media-src 'self' https: blob:; connect-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Malware / Ransomware Guardrails ───────────────────────────────
    # Block executable / dangerous file extensions
    location ~* \.(exe|dll|bat|cmd|sh|ps1|msi|cgi|php|asp|aspx|jsp|py|rb|pl)$ {
        deny all;
        return 403;
    }
    # Block hidden files (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
    # Block backup / config files
    location ~* \.(bak|conf|dist|fla|inc|ini|log|orig|sql|swp|swo|yml|yaml)$ {
        deny all;
        return 404;
    }

    # Angular SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
