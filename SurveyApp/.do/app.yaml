# ─────────────────────────────────────────────────────────
# Digital Ocean App Platform — TrustFeed Survey
# Deploy: doctl apps create --spec .do/app.yaml
# ─────────────────────────────────────────────────────────

name: trustfeed-survey
region: nyc

# ─── Angular Frontend (nginx) ───
services:
  - name: survey-frontend
    dockerfile_path: Dockerfile
    github:
      repo: <your-github-username>/trustfeed-survey
      branch: main
      deploy_on_push: true
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30

  # ─── Express API Server ───
  - name: survey-api
    dockerfile_path: server/Dockerfile
    github:
      repo: <your-github-username>/trustfeed-survey
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_SSL
        value: "true"
      - key: API_PORT
        value: "3000"
      - key: PEXELS_API_KEY
        type: SECRET
        value: "<your-pexels-api-key>"
    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 30

# ─── MySQL 8 Database (NO PII) ───
databases:
  - name: db
    engine: MYSQL
    version: "8"
    size: db-s-1vcpu-1gb
    num_nodes: 1
    db_name: TrustFeed
    db_user: trustfeed
