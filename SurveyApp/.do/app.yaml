# ─────────────────────────────────────────────────────────
# Digital Ocean App Platform — TrustFeed Survey
# Deploy:  doctl apps create --spec SurveyApp/.do/app.yaml
#
# Database: Create managed MySQL separately:
#   doctl databases create trustfeed-db --engine mysql --version 8 --size db-s-1vcpu-1gb --region nyc1
# Then update DB_HOST/DB_USER/DB_PASSWORD env vars.
# ─────────────────────────────────────────────────────────

name: trustfeed-survey
region: nyc

services:
  # ─── Angular Frontend (nginx) ───
  - name: survey-frontend
    dockerfile_path: SurveyApp/Dockerfile
    github:
      repo: prakasamv6/TrustFeed
      branch: main
      deploy_on_push: true
    source_dir: SurveyApp
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30

  # ─── Express API Server ───
  - name: survey-api
    dockerfile_path: SurveyApp/server/Dockerfile
    github:
      repo: prakasamv6/TrustFeed
      branch: main
      deploy_on_push: true
    source_dir: SurveyApp/server
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: DB_HOST
        type: SECRET
        value: "REPLACE_AFTER_DB_CREATION"
      - key: DB_PORT
        value: "25060"
      - key: DB_USER
        type: SECRET
        value: "REPLACE_AFTER_DB_CREATION"
      - key: DB_PASSWORD
        type: SECRET
        value: "REPLACE_AFTER_DB_CREATION"
      - key: DB_NAME
        value: "TrustFeed"
      - key: DB_SSL
        value: "true"
      - key: API_PORT
        value: "3000"
      - key: PEXELS_API_KEY
        type: SECRET
        value: "REPLACE_WITH_YOUR_KEY"
    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 30
