# Digital Ocean App Platform Specification
# Deploy with: doctl apps create --spec .do/app.yaml

name: trustfeed-survey
region: nyc

services:
  - name: survey-app
    dockerfile_path: Dockerfile
    github:
      repo: <your-github-username>/trustfeed-survey
      branch: main
      deploy_on_push: true
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
