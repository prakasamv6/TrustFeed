# ─────────────────────────────────────────────────────────
# Digital Ocean App Platform — TrustFeed (Monorepo)
# This is the root spec. Deploy with:
#   doctl apps create --spec .do/app.yaml
#
# Both apps share one GitHub repo. source_dir tells DO
# where each component lives.
# ─────────────────────────────────────────────────────────
#
# NOTE: DO App Platform supports ONE app per spec.
# Deploy each app separately:
#
#   doctl apps create --spec SurveyApp/.do/app.yaml
#   doctl apps create --spec AugmentedDoing/.do/app.yaml
#
# Or deploy the Survey app (primary) with this root spec:
# ─────────────────────────────────────────────────────────

name: trustfeed-survey
region: nyc

services:
  # ─── Survey Angular Frontend (nginx) ───
  - name: survey-frontend
    dockerfile_path: SurveyApp/Dockerfile
    github:
      repo: prakasamv6/TrustFeed
      branch: main
      deploy_on_push: true
    source_dir: SurveyApp
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30

  # ─── Survey Express API Server ───
  - name: survey-api
    dockerfile_path: SurveyApp/server/Dockerfile
    github:
      repo: prakasamv6/TrustFeed
      branch: main
      deploy_on_push: true
    source_dir: SurveyApp/server
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_SSL
        value: "true"
      - key: API_PORT
        value: "3000"
      - key: PEXELS_API_KEY
        type: SECRET
        value: "<your-pexels-api-key>"
    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 30

databases:
  - name: db
    engine: MYSQL
    version: "8"
    size: db-s-1vcpu-1gb
    num_nodes: 1
    db_name: TrustFeed
    db_user: trustfeed
