# ─────────────────────────────────────────────────────────
# Digital Ocean App Platform — TrustFeed Survey
# Deploy with:  doctl apps update <APP_ID> --spec .do/app.yaml
# ─────────────────────────────────────────────────────────

name: trustfeed-survey
region: nyc

databases:
  - name: db
    engine: MYSQL
    version: "8"

services:
  # ─── Survey Angular Frontend (nginx) ───
  - name: survey-frontend
    dockerfile_path: SurveyApp/Dockerfile
    github:
      repo: prakasamv6/TrustFeed
      branch: main
      deploy_on_push: true
    source_dir: SurveyApp
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30

  # ─── Survey Express API Server ───
  - name: survey-api
    dockerfile_path: SurveyApp/server/Dockerfile
    github:
      repo: prakasamv6/TrustFeed
      branch: main
      deploy_on_push: true
    source_dir: SurveyApp/server
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
        preserve_path_prefix: true
    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 30
    envs:
      - key: DB_HOST
        scope: RUN_TIME
        value: ${db.HOSTNAME}
      - key: DB_PORT
        scope: RUN_TIME
        value: ${db.PORT}
      - key: DB_USER
        scope: RUN_TIME
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        scope: RUN_TIME
        value: ${db.PASSWORD}
      - key: DB_NAME
        scope: RUN_TIME
        value: ${db.DATABASE}
      - key: DB_SSL
        value: "true"
      - key: DB_CA_CERT
        scope: RUN_TIME
        value: ${db.CA_CERT}
      - key: API_PORT
        value: "3000"
      - key: CORS_ORIGINS
        value: "http://localhost:4200,https://trustfeed-survey-ealep.ondigitalocean.app,${APP_URL}"
      - key: PEXELS_API_KEY
        type: SECRET
        value: "REPLACE_WITH_YOUR_KEY"
