# ─────────────────────────────────────────────────────────
# Digital Ocean App Platform — TrustFeed Core
# Deploy:  doctl apps create --spec AugmentedDoing/.do/app.yaml
# ─────────────────────────────────────────────────────────

name: trustfeed-core
region: nyc

services:
  # ─── Angular Frontend (nginx) ───
  - name: core-frontend
    dockerfile_path: AugmentedDoing/Dockerfile
    github:
      repo: prakasamv6/TrustFeed
      branch: main
      deploy_on_push: true
    source_dir: AugmentedDoing
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: TRUSTFEED_LIVE
        value: "true"
      - key: SURVEY_API_URL
        value: "https://trustfeed-survey-ealep.ondigitalocean.app"
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30

  # ─── FastAPI Backend ───
  - name: core-api
    dockerfile_path: AugmentedDoing/backend/Dockerfile
    github:
      repo: prakasamv6/TrustFeed
      branch: main
      deploy_on_push: true
    source_dir: AugmentedDoing/backend
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: MOCK_MODE
        value: "true"
      - key: CORS_ORIGINS
        value: "${APP_URL}"
      - key: SURVEY_API_URL
        value: "https://trustfeed-survey-ealep.ondigitalocean.app"
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
