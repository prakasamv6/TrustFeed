<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M256 28 C256 28, 80 80, 80 200 C80 340, 256 484, 256 484 C256 484, 432 340, 432 200 C432 80, 256 28, 256 28Z" fill="url(#shieldGrad)" stroke="#1e3a8a" stroke-width="4"/>
  <!-- Inner shield highlight -->
  <path d="M256 60 C256 60, 110 105, 110 210 C110 325, 256 452, 256 452 C256 452, 402 325, 402 210 C402 105, 256 60, 256 60Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Green leaf (right side) -->
  <path d="M310 160 C350 140, 380 170, 370 210 C360 250, 310 260, 280 240 C300 220, 330 200, 310 160Z" fill="url(#leafGrad)" opacity="0.9"/>
  <path d="M310 160 C300 200, 290 230, 280 240" fill="none" stroke="#15803d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Checkmark -->
  <path d="M190 240 L240 290 L330 185" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Signal waves (top right) -->
  <path d="M340 130 C355 115, 370 115, 370 130" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="6" stroke-linecap="round"/>
  <path d="M340 110 C365 85, 390 85, 390 110" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
  <path d="M340 90 C375 55, 410 55, 410 90" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
  <!-- TRUSTFEED text -->
  <text x="256" y="395" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="6" opacity="0.95">TRUSTFEED</text>
</svg>
